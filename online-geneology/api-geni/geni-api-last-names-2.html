<!DOCTYPE html>

<html>

<head>
  <script src="https://www.geni.com/jsdk.js"></script>
</head>

<body>
  <script>

    // ******************************************************************************************
    // Initialize GENI JS Client SDK
    // ******************************************************************************************
    Geni.init( {
      app_id: 'mQnhzHeM2YuqOAZNfINNSuncfcdEN2EKUyi1D9ft',
      cookie: false,
      logging: false
    } );

    // ******************************************************************************************
    // Helper methods
    // ******************************************************************************************
    function $ ( id ) {
      return document.getElementById( id );
    }

    // ******************************************************************************************
    // Helper methods
    // ******************************************************************************************
    function connectWithGeni () {
      Geni.connect( function ( response ) {
        if ( response.status == 'authorized' ) {
          $( "login_link" ).style.display = "none";
          $( "loading" ).style.display = "";
          loadFamilyNames();
        } else {
          $( "login_link" ).style.display = "";
        }
      } );
    }

    var name_counts = {};
    var pages_processed = 0;
    var profiles_seen = 0;
    var profiles_skipped = 0;
    var rate_limit_hits = 0;

    // Backoff and pacing
    const INITIAL_BACKOFF_MS = 1000;
    const MAX_BACKOFF_MS = 32000;
    const PAGE_DELAY_MS = 400; // gentle pacing between pages
    let currentBackoffMs = INITIAL_BACKOFF_MS;

    function generateDirectory () {
      html = [];
      var names = Object.keys( name_counts );
      names.sort();
      var total_count = 0;
      for ( var i = 0; i < names.length; i++ ) {
        var name = names[ i ];
        total_count = total_count + name_counts[ name ];
        var font_size = 10 + ( name_counts[ name ] * 5 );
        var title = name_counts[ name ] + ( name_counts[ name ] == 1 ? " member of your family has this last name" : " members of your family have this last name" );
        html.push( "<div><a href='https://www.geni.com/surnames/" + name + "' title='" + title + "'>" + name + "</a>" + " <span style='font-size:12px;color:#666;'>(" + name_counts[ name ] + ")</span></div>" );
      }

      var summary = "<div style='padding:20px;'>Your family has " + total_count + " members. "
        + "<span style='font-size:14px;color:#666'>(pages: " + pages_processed + ", profiles: " + profiles_seen + ", skipped: " + profiles_skipped + ", rate limits: " + rate_limit_hits + ")</span>"
        + "</div> ";

      $( "name_directory" ).innerHTML = summary + html.join( " " );
      $( "loading" ).style.display = "none";
    }

    // ******************************************************************************************
    // Load family methods
    // ******************************************************************************************
    function loadFamilyNames ( url ) {
      if ( !url ) { url = '/user/max-family'; }
      url = url.replace( "https://www.geni.com/api", "" );

      Geni.api( url, function ( response ) {
        try {
          console.log( "response", response );

          // Rate limit handling
          const message = response?.message || response?.error?.message || "";
          if ( /rate limit/i.test( message ) ) {
            rate_limit_hits += 1;
            $( "loading" ).textContent = `Rate limit exceeded. Retrying in ${ Math.round( currentBackoffMs / 1000 ) }s… (hits: ${ rate_limit_hits })`;
            const retryDelay = currentBackoffMs;
            currentBackoffMs = Math.min( currentBackoffMs * 2, MAX_BACKOFF_MS );
            setTimeout( function () { loadFamilyNames( url ); }, retryDelay );
            return; // don't proceed or finish yet
          }

          // Normalize results into an array
          let results = [];
          if ( Array.isArray( response?.results ) ) {
            results = response.results;
          } else if ( response?.results && typeof response.results === 'object' ) {
            results = Object.values( response.results );
          } else if ( Array.isArray( response ) ) {
            results = response; // sometimes APIs return arrays directly
          }

          pages_processed += 1;
          profiles_seen += results.length;

          // reset backoff after a successful page
          currentBackoffMs = INITIAL_BACKOFF_MS;

          // Process profiles safely
          for ( let i = 0; i < results.length; i++ ) {
            const profile = results[ i ];
            if ( !profile ) { continue; }

            // Try last_name, fallback to last token in full name
            const name = profile.last_name || ( profile.name ? profile.name.split( /\s+/ ).pop() : undefined );
            if ( !name ) { profiles_skipped += 1; continue; }

            if ( !name_counts[ name ] ) { name_counts[ name ] = 0; }
            name_counts[ name ] = name_counts[ name ] + 1;
          }

          // If no results were processed and there's a next page, continue; otherwise finish
          if ( response?.next_page ) {
            // Pace requests a bit to avoid hitting the rate limit again
            setTimeout( function () { loadFamilyNames( response.next_page ); }, PAGE_DELAY_MS );
          } else {
            generateDirectory();
          }
        } catch ( err ) {
          console.error( 'Error processing response', err );
          // Gracefully show whatever we have so far
          generateDirectory();
        }
      } );
    }
  </script>

  <div style="text-align:center; padding:30px; font-size:24px;">
    <div id="login_link">
      <a href="#" onClick="connectWithGeni()">Connect with Geni and see the last name directory of your family.</a>
    </div>

    <div id="loading" style="display:none;">
      Counting last names...
    </div>

    <div id="name_directory" style="text-align:left;">

    </div>
  </div>

</body>

</html>
